name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v0.1.0-alpha)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore Khipu.Net.slnx
      - run: dotnet build Khipu.Net.slnx --no-restore -warnaserror
      - run: dotnet test Khipu.Net.slnx --no-restore --no-build -warnaserror

  approve-release:
    name: Approve Release
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: production
    steps:
      - run: echo "Release approved."

  publish:
    needs: approve-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            IFS='.' read -r major minor patch <<< "${latest#v}"
            patch=$((patch + 1))
            TAG="v${major}.${minor}.${patch}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Strip 'v' prefix for NuGet version
          echo "nuget_version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build Release
        run: dotnet build Khipu.Net.slnx -c Release -p:Version=${{ steps.version.outputs.nuget_version }}

      - name: Pack libraries
        run: dotnet pack Khipu.Net.slnx -c Release --no-build -p:Version=${{ steps.version.outputs.nuget_version }} -o ./nupkgs

      - name: Push to NuGet.org
        run: dotnet nuget push "./nupkgs/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG" 2>/dev/null && git push origin "$TAG" || echo "Tag exists"
          gh release create "$TAG" --title "$TAG" --generate-notes || echo "Release exists"
