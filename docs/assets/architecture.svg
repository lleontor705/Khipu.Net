<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="720" height="400" rx="8" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">Khipu.Net Architecture</text>

  <!-- Layer 5: Khipu.Net (top) -->
  <rect x="220" y="48" width="280" height="44" rx="8" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="360" y="75" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Khipu.Net</text>
  <text x="360" y="88" text-anchor="middle" font-size="9" fill="#8888aa">NuGet metapackage</text>

  <!-- Layer 4: Validator -->
  <rect x="220" y="108" width="280" height="44" rx="8" fill="#e94560" filter="url(#shadow)"/>
  <text x="360" y="135" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Khipu.Validator</text>
  <text x="360" y="148" text-anchor="middle" font-size="9" fill="#ffccd5">33 constraint loaders + field validators</text>

  <!-- Layer 3: Core -->
  <rect x="140" y="168" width="440" height="54" rx="8" fill="#0f3460" filter="url(#shadow)"/>
  <text x="360" y="192" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Khipu.Core</text>
  <text x="360" y="208" text-anchor="middle" font-size="9" fill="#a0c4ff">Builder  |  Factory  |  TaxCalculator  |  XmlSigner  |  HtmlReport  |  QR  |  PDF</text>

  <!-- Layer 2: Xml + Ws (side by side) -->
  <rect x="40" y="238" width="310" height="54" rx="8" fill="#16213e" filter="url(#shadow)"/>
  <text x="195" y="262" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Khipu.Xml</text>
  <text x="195" y="278" text-anchor="middle" font-size="9" fill="#a0c4ff">9 XML builders  |  8 parsers  |  UBL 2.1</text>

  <rect x="370" y="238" width="310" height="54" rx="8" fill="#16213e" filter="url(#shadow)"/>
  <text x="525" y="262" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Khipu.Ws</text>
  <text x="525" y="278" text-anchor="middle" font-size="9" fill="#a0c4ff">SOAP  |  GRE REST  |  CDR  |  1710 error codes</text>

  <!-- Layer 1: Data (bottom) -->
  <rect x="40" y="308" width="640" height="54" rx="8" fill="#533483" filter="url(#shadow)"/>
  <text x="360" y="332" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Khipu.Data</text>
  <text x="360" y="348" text-anchor="middle" font-size="9" fill="#d4b8ff">9 document types  |  entities  |  enums  |  generators  |  zero dependencies</text>

  <!-- Arrows -->
  <g stroke="#ccc" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ccc"/></marker></defs>
    <line x1="360" y1="92" x2="360" y2="108"/>
    <line x1="360" y1="152" x2="360" y2="168"/>
    <line x1="260" y1="222" x2="195" y2="238"/>
    <line x1="460" y1="222" x2="525" y2="238"/>
    <line x1="195" y1="292" x2="260" y2="308"/>
    <line x1="525" y1="292" x2="460" y2="308"/>
  </g>

  <!-- Test badge -->
  <rect x="40" y="374" width="90" height="20" rx="4" fill="#4c1" opacity="0.9"/>
  <text x="85" y="388" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">409 tests</text>

  <rect x="140" y="374" width="90" height="20" rx="4" fill="#512bd4" opacity="0.9"/>
  <text x="185" y="388" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">.NET 10</text>

  <rect x="240" y="374" width="120" height="20" rx="4" fill="#e94560" opacity="0.9"/>
  <text x="300" y="388" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Greenter 100%</text>
</svg>
